<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>驾驶舒适度监测</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a1a; color: #e0e0e0;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 16px; overflow-x: hidden;
  }
  h1 { font-size: 1.3rem; margin-bottom: 4px; color: #7eb8ff; text-align: center; }
  .subtitle { font-size: 0.72rem; color: #666; margin-bottom: 14px; text-align: center; }

  .controls { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center; }
  .btn {
    border: none; padding: 12px 24px; border-radius: 12px; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; color: white; transition: transform 0.15s, opacity 0.2s;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-perm { background: linear-gradient(135deg, #4a90d9, #357abd); }
  .btn-stop { background: linear-gradient(135deg, #ff6b6b, #e03131); }
  .btn-reset { background: linear-gradient(135deg, #868e96, #495057); }

  .settings {
    width: 100%; max-width: 460px; background: #12122a; border-radius: 12px;
    padding: 14px; border: 1px solid #1e1e40; margin-bottom: 14px;
  }
  .settings-title { font-size: 0.7rem; color: #7eb8ff; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .setting-row:last-child { margin-bottom: 0; }
  .setting-label { font-size: 0.82rem; color: #aaa; flex: 1; }
  .setting-input {
    width: 80px; padding: 8px 10px; border-radius: 8px; border: 1px solid #333;
    background: #1a1a35; color: #fff; font-size: 0.95rem; font-weight: 600;
    text-align: center; font-variant-numeric: tabular-nums;
  }
  .setting-input:disabled { opacity: 0.4; }
  .setting-unit { font-size: 0.75rem; color: #666; margin-left: 6px; min-width: 40px; }

  .score-container {
    width: 100%; max-width: 460px; display: flex; align-items: center;
    gap: 14px; margin-bottom: 14px;
  }
  .score-circle {
    width: 80px; height: 80px; border-radius: 50%; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    border: 3px solid; flex-shrink: 0; transition: border-color 0.3s;
  }
  .score-number { font-size: 1.6rem; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
  .score-label { font-size: 0.55rem; color: #888; margin-top: 2px; }
  .score-detail { flex: 1; }
  .score-grade { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
  .score-breakdown { font-size: 0.7rem; color: #777; line-height: 1.5; }

  .alert-bar {
    width: 100%; max-width: 460px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; margin-bottom: 14px;
    transition: background 0.15s, color 0.15s;
  }
  .alert-bar.ok { background: #0a2010; color: #2d8a4e; border: 1px solid #1a3a20; }
  .alert-bar.warn-y { background: #2a1a0a; color: #ff6b6b; border: 1px solid #4a2a1a; animation: pulse 0.5s infinite; }
  .alert-bar.warn-x { background: #1a1a0a; color: #fcc419; border: 1px solid #3a3a1a; animation: pulse 0.6s infinite; }
  .alert-bar.warn-both { background: #2a0a0a; color: #ff4444; border: 1px solid #4a1a1a; animation: pulse 0.3s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

  .legend {
    width: 100%; max-width: 460px; display: flex; justify-content: center;
    gap: 20px; font-size: 0.73rem; color: #888; margin-bottom: 6px;
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend .dot { width: 12px; height: 3px; border-radius: 2px; }

  .chart-container {
    width: 100%; max-width: 460px; height: 240px;
    background: #0d0d24; border-radius: 16px; border: 1px solid #1e1e40;
    position: relative; overflow: hidden; margin-bottom: 14px;
  }
  canvas { width: 100%; height: 100%; display: block; }

  .info-row {
    width: 100%; max-width: 460px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;
  }
  .info-card {
    background: #12122a; border-radius: 10px; padding: 12px;
    border: 1px solid #1e1e40; text-align: center;
  }
  .info-label { font-size: 0.63rem; color: #8888aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .info-value { font-size: 1.2rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .info-value.red { color: #ff6b6b; }
  .info-value.green { color: #51cf66; }
  .info-value.sm { font-size: 0.95rem; color: #999; }

  #status { font-size: 0.78rem; color: #888; text-align: center; margin-top: 4px; max-width: 460px; line-height: 1.4; }

  .report-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 100; padding: 24px;
  }
  .report-overlay.hidden { display: none; }
  .report-card {
    width: 100%; max-width: 360px; background: #12122a; border-radius: 20px;
    padding: 24px; border: 1px solid #1e1e40; text-align: center;
  }
  .report-title { font-size: 1.1rem; color: #7eb8ff; margin-bottom: 16px; font-weight: 700; }
  .report-score { font-size: 3.5rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
  .report-grade { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; }
  .report-stats { text-align: left; font-size: 0.8rem; color: #888; line-height: 1.8; }
  .report-stats .stat-val { color: #ccc; font-weight: 600; }
  .report-close {
    margin-top: 20px; border: none; padding: 12px 32px; border-radius: 12px;
    background: linear-gradient(135deg, #4a90d9, #357abd);
    color: white; font-size: 1rem; font-weight: 600; cursor: pointer;
  }

  .cal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 100; padding: 30px;
  }
  .cal-overlay.hidden { display: none; }
  .cal-icon { font-size: 3rem; margin-bottom: 16px; }
  .cal-title { color: #fcc419; font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .cal-desc { color: #888; font-size: 0.9rem; text-align: center; line-height: 1.6; margin-bottom: 20px; max-width: 320px; }
  .cal-desc em { color: #fcc419; font-style: normal; font-weight: 600; }
  .cal-bar { width: 200px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
  .cal-fill { height: 100%; background: #fcc419; border-radius: 4px; transition: width 0.1s; width: 0%; }
  .cal-status { color: #aaa; font-size: 0.8rem; }
</style>
</head>
<body>

<h1>🚗 驾驶舒适度监测</h1>
<div class="subtitle">实时加速度曲线 · 超标声音报警 · 舒适度评分</div>

<div class="controls">
  <button class="btn btn-perm" id="permBtn" onclick="requestPermission()">授权传感器</button>
  <button class="btn btn-stop" id="stopBtn" onclick="stopSession()" style="display:none;">⏹ 停止</button>
  <button class="btn btn-reset" id="resetBtn" onclick="recalibrate()" style="display:none;">↻ 重新开始</button>
</div>

<div class="settings" id="settingsPanel">
  <div class="settings-title">⚙️ 报警阈值（校准前可修改）</div>
  <div class="setting-row">
    <span class="setting-label">🟢 加速/刹车阈值</span>
    <input type="number" class="setting-input" id="threshY" value="3.0" step="0.1" min="0.5" max="20">
    <span class="setting-unit">m/s²</span>
  </div>
  <div class="setting-row">
    <span class="setting-label">🔴 转弯阈值</span>
    <input type="number" class="setting-input" id="threshX" value="2.5" step="0.1" min="0.5" max="20">
    <span class="setting-unit">m/s²</span>
  </div>
</div>

<div class="score-container" id="scoreContainer" style="display:none;">
  <div class="score-circle" id="scoreCircle">
    <div class="score-number" id="scoreNumber">100</div>
    <div class="score-label">评分</div>
  </div>
  <div class="score-detail">
    <div class="score-grade" id="scoreGrade">🌟 非常舒适</div>
    <div class="score-breakdown" id="scoreBreakdown">等待数据...</div>
  </div>
</div>

<div class="alert-bar ok" id="alertBar">✅ 舒适</div>

<div class="legend">
  <span><div class="dot" style="background:#51cf66;"></div> 加速/刹车加速度</span>
  <span><div class="dot" style="background:#ff6b6b;"></div> 转弯加速度</span>
</div>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>

<div class="info-row">
  <div class="info-card">
    <div class="info-label">当前加速/刹车加速度 (m/s²)</div>
    <div class="info-value green" id="valY">0.00</div>
  </div>
  <div class="info-card">
    <div class="info-label">当前转弯加速度 (m/s²)</div>
    <div class="info-value red" id="valX">0.00</div>
  </div>
  <div class="info-card">
    <div class="info-label">加速/刹车峰值</div>
    <div class="info-value sm" id="peakY">0.00</div>
  </div>
  <div class="info-card">
    <div class="info-label">转弯峰值</div>
    <div class="info-value sm" id="peakX">0.00</div>
  </div>
</div>

<div id="status">请点击「授权传感器」开始</div>

<!-- 校准 -->
<div class="cal-overlay hidden" id="calOverlay">
  <div class="cal-icon">📐</div>
  <div class="cal-title">重力方向校准</div>
  <div class="cal-desc">
    请将手机<em>竖直握持（竖屏方向）</em>，保持静止 3 秒。<br><br>
    ✅ 可以有倾斜角度<br>
    ❌ 不要横放手机<br><br>
    手机顶部朝上，不要朝左或朝右。
  </div>
  <div class="cal-bar"><div class="cal-fill" id="calFill"></div></div>
  <div class="cal-status" id="calStatus">正在采集...</div>
</div>

<!-- 行程报告 -->
<div class="report-overlay hidden" id="reportOverlay">
  <div class="report-card">
    <div class="report-title">🏁 行程报告</div>
    <div class="report-score" id="reportScore">--</div>
    <div class="report-grade" id="reportGrade">--</div>
    <div class="report-stats" id="reportStats"></div>
    <button class="report-close" onclick="closeReport()">确定</button>
  </div>
</div>

<script>
// ============ CONFIG ============
const CAL_DURATION = 3000;
const CAL_MIN_SAMPLES = 50;
const SAMPLE_INTERVAL = 50;
const CHART_SECONDS = 15;
const GRAV_LP = 0.97;
const SCORE_UPDATE_MS = 500;

let THRESH_Y = 3.0;
let THRESH_X = 2.5;

// ============ AUDIO ============
let audioCtx = null;
function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playBeep() {
  ensureAudioCtx();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.value = 1200; g.gain.value = 0.3;
  const t = audioCtx.currentTime;
  o.start(t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06); o.stop(t + 0.06);
}
function playDong() {
  ensureAudioCtx();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.value = 400; g.gain.value = 0.35;
  const t = audioCtx.currentTime;
  o.start(t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.08); o.stop(t + 0.08);
}

let alertState = 'ok';
let soundTimer = null;
let bothToggle = false;
function startAlertLoop() {
  if (soundTimer) return;
  soundTimer = setInterval(() => {
    if (alertState === 'y') playBeep();
    else if (alertState === 'x') playDong();
    else if (alertState === 'both') { if (bothToggle) playBeep(); else playDong(); bothToggle = !bothToggle; }
  }, 125);
}
function stopAlertLoop() { if (soundTimer) { clearInterval(soundTimer); soundTimer = null; } }

function updateAlert() {
  const overY = Math.abs(accelHY) > THRESH_Y;
  const overX = Math.abs(accelHX) > THRESH_X;
  const bar = document.getElementById('alertBar');
  if (overX && overY) {
    if (alertState !== 'both') { alertState = 'both'; bothToggle = false; }
    bar.className = 'alert-bar warn-both'; bar.textContent = '⚠️ X和Y均超标！';
  } else if (overY) {
    alertState = 'y'; bar.className = 'alert-bar warn-y';
    bar.textContent = '⚠️ 加速/刹车超过 ' + THRESH_Y.toFixed(1);
  } else if (overX) {
    alertState = 'x'; bar.className = 'alert-bar warn-x';
    bar.textContent = '⚠️ 转弯超过 ' + THRESH_X.toFixed(1);
  } else {
    alertState = 'ok'; bar.className = 'alert-bar ok'; bar.textContent = '✅ 舒适';
  }
}

// ============ INCREMENTAL SCORING ============
// No memory growth: only keep running stats
let totalSamples = 0;
let sumSqNorm = 0;    // sum of (ax/thX)^2 + (ay/thY)^2
let overCount = 0;     // samples over threshold
let peakX = 0, peakY = 0;

// Bonus 1: Steady driving — consecutive 20s under 90% threshold → +1 each
let steadyStreak = 0;       // consecutive samples under 90%
let steadyBonus = 0;        // total bonus points earned
const STEADY_THRESHOLD = 0.9;  // 90% of threshold
const STEADY_SECONDS = 20;

// Bonus 2: Smooth operation — low jerk (acceleration change rate)
let prevAx = 0, prevAy = 0;
let sumJerkSq = 0;
let jerkSamples = 0;

// Bonus 3: Low intensity — overall RMS < 25% of threshold
// (computed in calcScore from existing sumSqNorm)

function addScoreSample(ax, ay) {
  totalSamples++;
  const nx = ax / THRESH_X, ny = ay / THRESH_Y;
  sumSqNorm += nx * nx + ny * ny;
  if (Math.abs(ax) > THRESH_X || Math.abs(ay) > THRESH_Y) overCount++;
  const absX = Math.abs(ax), absY = Math.abs(ay);
  if (absX > peakX) peakX = absX;
  if (absY > peakY) peakY = absY;

  // Bonus 1: steady driving streak
  if (absX < THRESH_X * STEADY_THRESHOLD && absY < THRESH_Y * STEADY_THRESHOLD) {
    steadyStreak++;
    // Sensor fires ~60Hz, 20 seconds = ~1200 samples
    const samplesFor20s = Math.round(20 * 60);
    if (steadyStreak >= samplesFor20s) {
      steadyBonus++;
      steadyStreak = 0; // reset streak, start counting next 20s
    }
  } else {
    steadyStreak = 0;
  }

  // Bonus 2: jerk tracking
  if (totalSamples > 1) {
    const jx = ax - prevAx, jy = ay - prevAy;
    sumJerkSq += jx * jx + jy * jy;
    jerkSamples++;
  }
  prevAx = ax;
  prevAy = ay;
}

function calcScore() {
  if (totalSamples < 10) return { score: 100, grade: '🌟 非常舒适', rms: 0, overPct: 0, rmsPenalty: 0, overPenalty: 0, peakPenalty: 0, steadyBonus: 0, jerkBonus: 0, lowIntensityBonus: 0 };

  const rms = Math.sqrt(sumSqNorm / totalSamples);
  const overPct = overCount / totalSamples;

  const maxOverX = Math.max(0, peakX - THRESH_X);
  const maxOverY = Math.max(0, peakY - THRESH_Y);

  const rmsPenalty = Math.min(30, rms * 20);
  const overPenalty = Math.min(40, overPct * 200);
  const peakOver = (maxOverX / THRESH_X + maxOverY / THRESH_Y) / 2;
  const peakPenalty = Math.min(30, peakOver * 15);

  // Bonus 2: jerk — low jerk RMS means smooth operation
  const jerkRms = jerkSamples > 0 ? Math.sqrt(sumJerkSq / jerkSamples) : 0;
  // Normalize: jerkRms < 0.3 → full 5pts, > 1.5 → 0pts
  const jerkBonus = Math.max(0, Math.min(5, (1.5 - jerkRms) / 1.2 * 5));

  // Bonus 3: low intensity — rms < 0.25 → full 5pts
  const lowIntensityBonus = rms < 0.25 ? 5 : rms < 0.5 ? Math.round((0.5 - rms) / 0.25 * 5) : 0;

  const totalBonus = steadyBonus + jerkBonus + lowIntensityBonus;
  const rawScore = 100 - rmsPenalty - overPenalty - peakPenalty + totalBonus;
  const score = Math.max(0, Math.min(100, Math.round(rawScore)));

  let grade;
  if (score >= 90) grade = '🌟 非常舒适';
  else if (score >= 75) grade = '👍 比较舒适';
  else if (score >= 60) grade = '😐 一般';
  else if (score >= 40) grade = '😬 较颠簸';
  else grade = '🤢 非常颠簸';

  return { score, grade, rms, overPct, rmsPenalty, overPenalty, peakPenalty, steadyBonus, jerkBonus: Math.round(jerkBonus * 10) / 10, lowIntensityBonus };
}

function getScoreColor(score) {
  if (score >= 90) return '#51cf66';
  if (score >= 75) return '#7eb8ff';
  if (score >= 60) return '#fcc419';
  if (score >= 40) return '#ff922b';
  return '#ff6b6b';
}

let scoreTimer = null;
function updateScoreDisplay() {
  const r = calcScore();
  const c = getScoreColor(r.score);
  document.getElementById('scoreNumber').textContent = r.score;
  document.getElementById('scoreNumber').style.color = c;
  document.getElementById('scoreCircle').style.borderColor = c;
  document.getElementById('scoreGrade').textContent = r.grade;
  document.getElementById('scoreGrade').style.color = c;
  const overStr = (r.overPct * 100).toFixed(1);
  document.getElementById('scoreBreakdown').textContent =
    `RMS: ${r.rms.toFixed(2)} | 超标: ${overStr}% | 加分: +${(r.steadyBonus + r.jerkBonus + r.lowIntensityBonus).toFixed(1)}`;
}
function startScoreUpdates() {
  document.getElementById('scoreContainer').style.display = 'flex';
  scoreTimer = setInterval(updateScoreDisplay, SCORE_UPDATE_MS);
}
function stopScoreUpdates() { if (scoreTimer) { clearInterval(scoreTimer); scoreTimer = null; } }

// ============ WAKE LOCK ============
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (e) { console.log('Wake lock failed:', e); }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
// Re-acquire wake lock when page becomes visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && running) requestWakeLock();
});

// ============ STATE ============
let permissionGranted = false;
let calibrated = false;
let calibrating = false;
let running = false;

let calStartTime = 0;
let calAccelSamples = [];

let gUnitX = 0, gUnitY = 0, gUnitZ = 1;
let basisAx = 0, basisAy = 0, basisAz = 0;
let basisBx = 0, basisBy = 0, basisBz = 0;

let gravX = 0, gravY = 0, gravZ = 9.8;
let gravInited = false;

let accelHX = 0, accelHY = 0;

let dataX = [], dataY = [];
let chartStartTime = 0;
let sampleTimer = null;
let sessionStartTime = 0;

const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); drawChart();
}
window.addEventListener('resize', resizeCanvas);

// ============ SENSOR ============
function handleMotion(e) {
  const now = performance.now();
  const agx = e.accelerationIncludingGravity?.x || 0;
  const agy = e.accelerationIncludingGravity?.y || 0;
  const agz = e.accelerationIncludingGravity?.z || 0;

  if (!gravInited) { gravX = agx; gravY = agy; gravZ = agz; gravInited = true; }
  else {
    gravX = GRAV_LP * gravX + (1 - GRAV_LP) * agx;
    gravY = GRAV_LP * gravY + (1 - GRAV_LP) * agy;
    gravZ = GRAV_LP * gravZ + (1 - GRAV_LP) * agz;
  }

  if (calibrating) {
    calAccelSamples.push({ x: agx, y: agy, z: agz });
    const progress = Math.min((now - calStartTime) / CAL_DURATION * 100, 100);
    document.getElementById('calFill').style.width = progress + '%';
    document.getElementById('calStatus').textContent = `正在采集... ${calAccelSamples.length} 个样本`;
    if (now - calStartTime >= CAL_DURATION) finishCalibration();
    return;
  }

  if (!calibrated || !running) return;

  const ax = e.acceleration?.x || 0;
  const ay = e.acceleration?.y || 0;
  const az = e.acceleration?.z || 0;

  accelHX = ax * basisAx + ay * basisAy + az * basisAz;
  accelHY = ax * basisBx + ay * basisBy + az * basisBz;

  addScoreSample(accelHX, accelHY);

  document.getElementById('valX').textContent = accelHX.toFixed(2);
  document.getElementById('valY').textContent = accelHY.toFixed(2);
  document.getElementById('peakX').textContent = peakX.toFixed(2);
  document.getElementById('peakY').textContent = peakY.toFixed(2);

  updateAlert();
}

// ============ CHART ============
function startSampling() {
  chartStartTime = performance.now();
  dataX = []; dataY = [];
  sampleTimer = setInterval(() => {
    const t = (performance.now() - chartStartTime) / 1000;
    dataX.push({ t, v: accelHX }); dataY.push({ t, v: accelHY });
    const maxSamples = Math.ceil(CHART_SECONDS / (SAMPLE_INTERVAL / 1000)) + 20;
    if (dataX.length > maxSamples) dataX.shift();
    if (dataY.length > maxSamples) dataY.shift();
    drawChart();
  }, SAMPLE_INTERVAL);
  startAlertLoop(); startScoreUpdates();
  requestWakeLock();
}

function stopSampling() {
  if (sampleTimer) { clearInterval(sampleTimer); sampleTimer = null; }
  stopAlertLoop(); stopScoreUpdates();
  releaseWakeLock();
}

function drawChart() {
  const w = canvas.width / dpr, h = canvas.height / dpr;
  const pad = { top: 16, right: 12, bottom: 28, left: 44 };
  const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  let maxAbs = Math.max(THRESH_X, THRESH_Y, 2);
  for (const d of dataX) { if (Math.abs(d.v) > maxAbs) maxAbs = Math.abs(d.v); }
  for (const d of dataY) { if (Math.abs(d.v) > maxAbs) maxAbs = Math.abs(d.v); }
  const yRange = Math.max(1, Math.ceil(maxAbs) + 1);

  const now = dataX.length > 0 ? dataX[dataX.length - 1].t : 0;
  const tMin = now - CHART_SECONDS, tMax = now;

  function xP(t) { return pad.left + ((t - tMin) / (tMax - tMin)) * cw; }
  function yP(v) { return pad.top + ch / 2 - (v / yRange) * (ch / 2); }

  ctx.fillStyle = '#0a0a18'; ctx.fillRect(pad.left, pad.top, cw, ch);

  // Threshold bands
  const yTT = yP(THRESH_Y), yTB = yP(-THRESH_Y);
  ctx.fillStyle = 'rgba(255,107,107,0.04)';
  ctx.fillRect(pad.left, pad.top, cw, yTT - pad.top);
  ctx.fillRect(pad.left, yTB, cw, pad.top + ch - yTB);

  ctx.strokeStyle = 'rgba(255,107,107,0.25)'; ctx.lineWidth = 1; ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(pad.left, yTT); ctx.lineTo(pad.left + cw, yTT); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.left, yTB); ctx.lineTo(pad.left + cw, yTB); ctx.stroke();
  const xTT = yP(THRESH_X), xTB = yP(-THRESH_X);
  ctx.strokeStyle = 'rgba(252,196,25,0.25)';
  ctx.beginPath(); ctx.moveTo(pad.left, xTT); ctx.lineTo(pad.left + cw, xTT); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.left, xTB); ctx.lineTo(pad.left + cw, xTB); ctx.stroke();
  ctx.setLineDash([]);

  ctx.font = '8px -apple-system,sans-serif';
  ctx.fillStyle = 'rgba(255,107,107,0.4)'; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillText('刹车/加速 ±' + THRESH_Y.toFixed(1), pad.left + cw - 4, yTT - 2);
  ctx.fillStyle = 'rgba(252,196,25,0.4)'; ctx.textBaseline = 'top';
  ctx.fillText('转弯 ±' + THRESH_X.toFixed(1), pad.left + cw - 4, xTT + 2);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
  const yStep = yRange <= 3 ? 1 : yRange <= 10 ? 2 : yRange <= 30 ? 5 : 10;
  for (let a = -yRange; a <= yRange; a += yStep) {
    const y = yP(a); if (y < pad.top || y > pad.top + ch) continue;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
  const zeroY = yP(0);
  ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(pad.left + cw, zeroY); ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
  const tStep = CHART_SECONDS <= 5 ? 1 : CHART_SECONDS <= 15 ? 2 : 5;
  const firstT = Math.ceil(tMin / tStep) * tStep;
  for (let t = firstT; t <= tMax; t += tStep) {
    const x = xP(t); if (x < pad.left || x > pad.left + cw) continue;
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + ch); ctx.stroke();
  }

  ctx.fillStyle = '#555'; ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let a = -yRange; a <= yRange; a += yStep) {
    const y = yP(a); if (y < pad.top + 5 || y > pad.top + ch - 5) continue;
    ctx.fillText(a.toFixed(0), pad.left - 5, y);
  }
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let t = firstT; t <= tMax; t += tStep) {
    const x = xP(t); if (x < pad.left + 10 || x > pad.left + cw - 10) continue;
    ctx.fillText(t.toFixed(0) + 's', x, pad.top + ch + 4);
  }
  ctx.fillStyle = '#444'; ctx.font = '8px -apple-system,sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('时间 (秒)', pad.left + cw / 2, h - 2);
  ctx.save(); ctx.translate(8, pad.top + ch / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('m/s²', 0, 0); ctx.restore();

  ctx.save(); ctx.beginPath(); ctx.rect(pad.left, pad.top, cw, ch); ctx.clip();

  function drawLine(data, color) {
    if (data.length < 2) return;
    ctx.beginPath(); let s = false;
    for (const d of data) { if (d.t < tMin) continue; const x = xP(d.t), y = yP(d.v); if (!s) { ctx.moveTo(x, zeroY); ctx.lineTo(x, y); s = true; } else ctx.lineTo(x, y); }
    if (s) { ctx.lineTo(xP(data[data.length-1].t), zeroY); ctx.closePath(); ctx.fillStyle = color.replace('1)','0.06)'); ctx.fill(); }
    ctx.beginPath(); s = false;
    for (const d of data) { if (d.t < tMin) continue; const x = xP(d.t), y = yP(d.v); if (!s) { ctx.moveTo(x, y); s = true; } else ctx.lineTo(x, y); }
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();
    const last = data[data.length-1]; ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(xP(last.t), yP(last.v), 3.5, 0, Math.PI*2); ctx.fill();
  }
  drawLine(dataX, 'rgba(255,107,107,1)');
  drawLine(dataY, 'rgba(81,207,102,1)');
  ctx.restore();
  ctx.strokeStyle = '#1e1e40'; ctx.lineWidth = 1; ctx.strokeRect(pad.left, pad.top, cw, ch);
}

// ============ SESSION ============
function stopSession() {
  running = false; stopSampling();
  alertState = 'ok';
  document.getElementById('alertBar').className = 'alert-bar ok';
  document.getElementById('alertBar').textContent = '⏹ 已停止';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = '';

  const result = calcScore();
  updateScoreDisplay();
  showReport(result);
}

function showReport(result) {
  const duration = ((performance.now() - sessionStartTime) / 1000);
  const min = Math.floor(duration / 60);
  const sec = (duration % 60).toFixed(0);
  const durStr = min > 0 ? `${min}分${sec}秒` : `${sec}秒`;
  const color = getScoreColor(result.score);

  document.getElementById('reportScore').textContent = result.score;
  document.getElementById('reportScore').style.color = color;
  document.getElementById('reportGrade').textContent = result.grade;
  document.getElementById('reportGrade').style.color = color;

  const overPct = (result.overPct * 100).toFixed(1);
  document.getElementById('reportStats').innerHTML =
    `<div>记录时长：<span class="stat-val">${durStr}</span></div>` +
    `<div>总采样数：<span class="stat-val">${totalSamples}</span></div>` +
    `<div>转弯峰值：<span class="stat-val">${peakX.toFixed(2)} m/s²</span></div>` +
    `<div>加速/刹车峰值：<span class="stat-val">${peakY.toFixed(2)} m/s²</span></div>` +
    `<div>加速度RMS：<span class="stat-val">${result.rms.toFixed(2)}</span></div>` +
    `<div>超标时间占比：<span class="stat-val">${overPct}%</span></div>` +
    `<div>──────────</div>` +
    `<div>平滑度扣分：<span class="stat-val">-${result.rmsPenalty.toFixed(1)}</span></div>` +
    `<div>超标时间扣分：<span class="stat-val">-${result.overPenalty.toFixed(1)}</span></div>` +
    `<div>峰值扣分：<span class="stat-val">-${result.peakPenalty.toFixed(1)}</span></div>` +
    `<div>──────────</div>` +
    `<div>持续平稳加分：<span class="stat-val" style="color:#51cf66">+${result.steadyBonus}</span>（每20秒平稳+1）</div>` +
    `<div>柔和操作加分：<span class="stat-val" style="color:#51cf66">+${result.jerkBonus}</span></div>` +
    `<div>低强度驾驶加分：<span class="stat-val" style="color:#51cf66">+${result.lowIntensityBonus}</span></div>`;

  document.getElementById('reportOverlay').classList.remove('hidden');
}

function closeReport() { document.getElementById('reportOverlay').classList.add('hidden'); }

// ============ CALIBRATION ============
function startCalibration() {
  THRESH_Y = parseFloat(document.getElementById('threshY').value) || 3.0;
  THRESH_X = parseFloat(document.getElementById('threshX').value) || 2.5;
  document.getElementById('threshY').disabled = true;
  document.getElementById('threshX').disabled = true;

  calibrating = true; calStartTime = performance.now(); calAccelSamples = [];
  document.getElementById('calOverlay').classList.remove('hidden');
  document.getElementById('calFill').style.width = '0%';
}

function finishCalibration() {
  calibrating = false;
  document.getElementById('calOverlay').classList.add('hidden');

  if (calAccelSamples.length < CAL_MIN_SAMPLES) {
    document.getElementById('status').textContent = '❌ 采样不足，请重试。';
    document.getElementById('threshY').disabled = false;
    document.getElementById('threshX').disabled = false;
    return;
  }

  let sx = 0, sy = 0, sz = 0;
  for (const s of calAccelSamples) { sx += s.x; sy += s.y; sz += s.z; }
  const n = calAccelSamples.length;
  const avgX = sx/n, avgY = sy/n, avgZ = sz/n;
  const mag = Math.sqrt(avgX*avgX + avgY*avgY + avgZ*avgZ);

  if (mag < 5) {
    document.getElementById('status').textContent = '❌ 重力值异常，请重试。';
    document.getElementById('threshY').disabled = false;
    document.getElementById('threshX').disabled = false;
    return;
  }

  gUnitX = avgX/mag; gUnitY = avgY/mag; gUnitZ = avgZ/mag;
  gravX = avgX; gravY = avgY; gravZ = avgZ;

  let ax = 1-gUnitX*gUnitX, ay = -gUnitX*gUnitY, az = -gUnitX*gUnitZ;
  let alen = Math.sqrt(ax*ax+ay*ay+az*az);
  if (alen < 0.01) { ax = -gUnitY*gUnitX; ay = 1-gUnitY*gUnitY; az = -gUnitY*gUnitZ; alen = Math.sqrt(ax*ax+ay*ay+az*az); }
  basisAx = ax/alen; basisAy = ay/alen; basisAz = az/alen;
  basisBx = gUnitY*basisAz-gUnitZ*basisAy;
  basisBy = gUnitZ*basisAx-gUnitX*basisAz;
  basisBz = gUnitX*basisAy-gUnitY*basisAx;
  const blen = Math.sqrt(basisBx*basisBx+basisBy*basisBy+basisBz*basisBz);
  basisBx /= blen; basisBy /= blen; basisBz /= blen;

  accelHX = 0; accelHY = 0; peakX = 0; peakY = 0;
  totalSamples = 0; sumSqNorm = 0; overCount = 0;
  steadyStreak = 0; steadyBonus = 0; sumJerkSq = 0; jerkSamples = 0; prevAx = 0; prevAy = 0;
  calibrated = true; running = true;
  sessionStartTime = performance.now();

  document.getElementById('stopBtn').style.display = '';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('status').textContent =
    `✅ 校准完成！阈值：Y=${THRESH_Y.toFixed(1)}，X=${THRESH_X.toFixed(1)} m/s²`;

  ensureAudioCtx();
  startSampling();
}

function recalibrate() {
  stopSampling(); calibrated = false; running = false;
  accelHX = 0; accelHY = 0; peakX = 0; peakY = 0;
  totalSamples = 0; sumSqNorm = 0; overCount = 0;
  steadyStreak = 0; steadyBonus = 0; sumJerkSq = 0; jerkSamples = 0; prevAx = 0; prevAy = 0;
  dataX = []; dataY = [];
  alertState = 'ok';
  document.getElementById('alertBar').className = 'alert-bar ok';
  document.getElementById('alertBar').textContent = '✅ 舒适';
  document.getElementById('valX').textContent = '0.00';
  document.getElementById('valY').textContent = '0.00';
  document.getElementById('peakX').textContent = '0.00';
  document.getElementById('peakY').textContent = '0.00';
  document.getElementById('scoreContainer').style.display = 'none';
  document.getElementById('threshY').disabled = false;
  document.getElementById('threshX').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
  drawChart(); startCalibration();
}

// ============ PERMISSION ============
function requestPermission() {
  ensureAudioCtx();
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(state => {
        if (state === 'granted') onPermGranted();
        else document.getElementById('status').textContent = '❌ 传感器权限被拒绝';
      })
      .catch(err => { document.getElementById('status').textContent = '❌ ' + err.message; });
  } else { onPermGranted(); }
}

function onPermGranted() {
  permissionGranted = true;
  window.addEventListener('devicemotion', handleMotion, true);
  document.getElementById('permBtn').disabled = true;
  document.getElementById('permBtn').textContent = '✅ 已授权';
  startCalibration();
}

resizeCanvas(); drawChart();
</script>
